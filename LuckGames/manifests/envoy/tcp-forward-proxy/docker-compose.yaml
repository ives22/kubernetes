version: "3.3"

services:
  envoy:
    image: envoyproxy/envoy:v1.32.5
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
    networks:
      envoymesh:
        ipv4_address: 172.16.1.2
        aliases:
          - forward-proxy
  
  admin-tools:
    image: vvoo/admin-box:latest
    command: ["sleep 36000"]
    networks: 
      envoymesh:
        ipv4_address: 172.16.1.3
        aliases:
          - tools

networks:
  envoymesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.16.1.0/24
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-prestop-pvc
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 1Gi
  storageClassName: alicloud-nas-subpath

---
apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: default
spec:
  containers:
    - name: demo
      image: vvoo/demoapp:v1.0
      imagePullPolicy: IfNotPresent
      resources:
        requests:
          cpu: "100m"
          memory: 100Mi
      securityContext:
        capabilities:
          add:
            - NET_ADMIN
      volumeMounts:
        - name: prestop-vl
          mountPath: /data
  volumes:
    - name: prestop-vl
      persistentVolumeClaim:
        claimName: test-prestop-pvc

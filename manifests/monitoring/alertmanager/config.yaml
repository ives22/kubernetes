apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager
  namespace: monitoring
data:
  config.yml: |
    global:
      # 当 alertmanager 持续多长时间未接收到告警后标记告警状态为 resolved
      resolve_timeout: 5m
      # 配置邮件发送信息
      smtp_smarthost: 'smtp.163.com:25'
      smtp_from: 'xxx@163.com'  # 163邮箱地址
      smtp_auth_username: 'xxx@163.com'
      smtp_auth_password: '<邮箱密码>'  # 使用网易邮箱的授权码
      smtp_hello: '163.com'
      smtp_require_tls: false

    # 所有报警信息进入 route, route 根据报警信息的标签进行路由
    route:
      # 这里的标签列表是接收到报警信息后的重新分组标签，例如，接收到的报警信息中有许多具有 cluster=A 和 alertname=HighError 的报警，那么这些报警会被分组到一起
      group_by: ['alertname', 'cluster']
      # 当一个新的报警分组被创建后，需要等待至少 group_wait 时间后才会发送报警，如果在这 group_wait 时间内又收到了新的报警信息，则重新计时
      group_wait: 30s
      
      # 相同的group之间发送告警通知的间隔时间
      group_interval: 5m

      # 如果一个报警信息已经发送成功了，等待 repeat_interval 时间来重新发送它们，不同类型的告警发送频率需要具体配置
      repeat_interval: 1h

      # 默认的receiver，如果一个报警没有被一个route匹配，则发送给默认的接收器
      receiver: default

      # 上面所有的属性都由所有子路由继承，并且可以在每个子路由上进行覆盖。
      routes:
      - receiver: email
        group_wait: 10s
        match:
          team: node
    receivers:
    - name: 'webhook'
      webhook_configs:
      - url: 'http://47.237.138.103:8102/webhook'
    - name: 'email'
      email_configs:
      - to: 'xxx@163.com'
        send_resolved: true
    - name: 'default'
      webhook_configs:
      - url: 'http://47.237.138.103:8102/webhook'
